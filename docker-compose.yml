services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - app-data:/app/server/data
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hualian.rule=Host(`hl.xee.link`)"
      - "traefik.http.routers.hualian.entrypoints=websecure"
      - "traefik.http.routers.hualian.tls.certResolver=letsencrypt"
      - "traefik.http.services.hualian.loadbalancer.server.port=80"

volumes:
  app-data:

networks:
  dokploy-network:
    external: true
